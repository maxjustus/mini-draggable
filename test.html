<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine Sortable Test</title>
  <link rel="stylesheet" href="test-styles.css">
</head>
<body>

  <!-- Test 1: Basic sortable -->
  <h2>1. Basic sortable</h2>
  <div x-data="{ items: ['Apple', 'Banana', 'Cherry', 'Date', 'Elderberry'], log: '' }"
       x-sortable="items"
       @reorder="log = `Moved from ${$event.detail.from} to ${$event.detail.to}`">
    <ul class="list">
      <template x-for="item in items" :key="item">
        <li class="item" x-sortable-item x-text="item"></li>
      </template>
    </ul>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 2: With handles -->
  <h2>2. With handles</h2>
  <div x-data="{ items: ['Red', 'Green', 'Blue', 'Yellow'], log: '' }"
       x-sortable="items"
       @reorder="log = `Moved from ${$event.detail.from} to ${$event.detail.to}`">
    <ul class="list">
      <template x-for="item in items" :key="item">
        <li class="item" x-sortable-item.handle>
          <span class="handle" x-sortable-handle>&#x2630;</span>
          <span x-text="item"></span>
        </li>
      </template>
    </ul>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 3: With disabled item -->
  <h2>3. With disabled item</h2>
  <div x-data="{
         items: [
           { name: 'Movable A', disabled: false },
           { name: 'Pinned (disabled)', disabled: true },
           { name: 'Movable B', disabled: false },
           { name: 'Movable C', disabled: false },
         ],
         log: ''
       }"
       x-sortable="items"
       @reorder="log = `Moved from ${$event.detail.from} to ${$event.detail.to}`">
    <ul class="list">
      <template x-for="item in items" :key="item.name">
        <li class="item"
            :class="item.disabled && 'item--disabled'"
            x-sortable-item
            :data-drag-disabled="item.disabled || false"
            x-text="item.name"></li>
      </template>
    </ul>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 4: Scrollable container -->
  <h2>4. Scrollable container</h2>
  <div x-data="{ items: Array.from({length: 20}, (_, i) => `Item ${i + 1}`), log: '' }">
    <div class="scrollable"
         x-sortable="items"
         @reorder="log = `Moved from ${$event.detail.from} to ${$event.detail.to}`">
      <ul class="list">
        <template x-for="item in items" :key="item">
          <li class="item" x-sortable-item x-text="item"></li>
        </template>
      </ul>
    </div>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 5: 2D grid with varied sizes -->
  <h2>5. 2D grid with varied sizes</h2>
  <div x-data="{
         items: [
           { label: 'A', w: 1, h: 1, color: '#e8f5e9' },
           { label: 'B', w: 2, h: 1, color: '#e3f2fd' },
           { label: 'C', w: 1, h: 1, color: '#fff3e0' },
           { label: 'D', w: 1, h: 2, color: '#fce4ec' },
           { label: 'E', w: 1, h: 1, color: '#f3e5f5' },
           { label: 'F', w: 1, h: 1, color: '#e0f7fa' },
           { label: 'G', w: 2, h: 1, color: '#fff9c4' },
           { label: 'H', w: 1, h: 1, color: '#efebe9' },
           { label: 'I', w: 1, h: 1, color: '#e8eaf6' },
           { label: 'J', w: 1, h: 1, color: '#f1f8e9' },
         ],
         log: ''
       }"
       x-sortable="items"
       @reorder="log = `Moved ${items[$event.detail.to].label} from ${$event.detail.from} to ${$event.detail.to}`">
    <ul class="grid">
      <template x-for="item in items" :key="item.label">
        <li class="grid-item"
            x-sortable-item
            :style="`
              grid-column: span ${item.w};
              grid-row: span ${item.h};
              min-height: ${item.h * 60}px;
              background: ${item.color};
            `"
            x-text="item.label"></li>
      </template>
    </ul>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 6: Variable height items -->
  <h2>6. Variable height items</h2>
  <div x-data="{
         items: [
           { id: 1, text: 'Short item' },
           { id: 2, text: 'This item has quite a bit more content in it so it will naturally wrap to multiple lines and be taller than the others' },
           { id: 3, text: 'Medium length item with some extra text' },
           { id: 4, text: 'Tiny' },
           { id: 5, text: 'Another tall one. Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.' },
           { id: 6, text: 'Regular item' },
         ],
         log: ''
       }"
       x-sortable="items"
       @reorder="log = `Moved from ${$event.detail.from} to ${$event.detail.to}`">
    <ul class="list">
      <template x-for="item in items" :key="item.id">
        <li class="item" x-sortable-item x-text="item.text"></li>
      </template>
    </ul>
    <div class="log" x-text="log"></div>
  </div>

  <!-- Test 7: Multi-column (Trello-style) -->
  <h2>7. Multi-column (Trello-style)</h2>
  <div x-data="{
         todo: ['Design mockups for the new landing page and get stakeholder sign-off', 'Write tests', 'Update docs with migration guide and new API examples'],
         doing: ['Build the drag-and-drop feature with cross-container support, animation, and touch handling', 'Code review'],
         done: ['Setup repo', 'Initial commit with project scaffold, CI config, and dev tooling'],
         log: ''
       }"
       @transfer="log = `Transferred from idx ${$event.detail.from} to idx ${$event.detail.to}`"
       @reorder="log = `Reordered from ${$event.detail.from} to ${$event.detail.to}`">
    <div style="display: flex; gap: 16px; max-width: 700px;">
      <div style="flex: 1;">
        <h3 style="font-size: 13px; margin-bottom: 8px; color: #666;">To Do</h3>
        <ul class="list" style="min-height: 60px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px;"
            x-sortable.board="todo">
          <template x-for="item in todo" :key="item">
            <li class="item" x-sortable-item x-text="item"></li>
          </template>
        </ul>
      </div>
      <div style="flex: 1;">
        <h3 style="font-size: 13px; margin-bottom: 8px; color: #666;">Doing</h3>
        <ul class="list" style="min-height: 60px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px;"
            x-sortable.board="doing">
          <template x-for="item in doing" :key="item">
            <li class="item" x-sortable-item x-text="item"></li>
          </template>
        </ul>
      </div>
      <div style="flex: 1;">
        <h3 style="font-size: 13px; margin-bottom: 8px; color: #666;">Done</h3>
        <ul class="list" style="min-height: 60px; background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 4px;"
            x-sortable.board="done">
          <template x-for="item in done" :key="item">
            <li class="item" x-sortable-item x-text="item"></li>
          </template>
        </ul>
      </div>
    </div>
    <div class="log" x-text="log"></div>
    <div class="log" x-text="'Todo: ' + todo.join(', ')"></div>
    <div class="log" x-text="'Doing: ' + doing.join(', ')"></div>
    <div class="log" x-text="'Done: ' + done.join(', ')"></div>
  </div>

  <script type="module">
    import AlpineSortable from './alpine-sortable.js';
    import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js';
    Alpine.plugin(AlpineSortable);
    Alpine.start();
    window.Alpine = Alpine;
  </script>
</body>
</html>
